# macOS 向けに jarvis-bridge（ローカル仲介サーバー）をビルドして配布する。
# ブリッジは core を再利用するだけで tauri/webkit に依存しないため、tauri アプリ全体を
# ビルドせずに済む（`-p jarvis-bridge`）。Apple Silicon + Intel の universal binary を生成。
#
# 配布:
#  - workflow_dispatch（手動実行）→ Actions の Artifact としてダウンロード可能。
#  - `bridge-v*` タグの push → GitHub Release にバイナリを添付。
name: Build bridge (macOS)

on:
  push:
    tags: ["bridge-v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add Rust targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin
      - name: Build bridge (arm64 + x86_64)
        working-directory: src-tauri
        run: |
          cargo build -p jarvis-bridge --release --target aarch64-apple-darwin
          cargo build -p jarvis-bridge --release --target x86_64-apple-darwin
      - name: Make universal binary
        working-directory: src-tauri
        run: |
          lipo -create -output jarvis-bridge \
            target/aarch64-apple-darwin/release/jarvis-bridge \
            target/x86_64-apple-darwin/release/jarvis-bridge
          chmod +x jarvis-bridge
          file jarvis-bridge
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-bridge-macos-universal
          path: src-tauri/jarvis-bridge
      - name: Attach to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/jarvis-bridge
